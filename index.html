<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Model Switcher</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">H</div>
        <div>
          <h1>Hermes Model Switcher</h1>
          <p class="subtitle">按 provider 分组选择模型，并切换 Hermes 默认配置。<span class="profile-badge" id="profileBadge"></span></p>
        </div>
      </div>
      <select class="profile-select" id="profileSelect" aria-label="选择 Agent Profile">
        <option value="default">🟢 default</option>
      </select>
      <button class="refresh-btn" id="refreshBtn" type="button">刷新列表</button>
    </header>

    <div class="health-bar" id="healthBar">
      <span class="health-item"><span class="health-dot" id="healthDot"></span><span id="healthLabel">检查中…</span></span>
      <span class="health-sep"></span>
      <span class="health-item" id="healthConfig">⚙️ 检查中…</span>
      <span class="health-sep"></span>
      <span class="health-item" id="healthHermes">🧠 检查中…</span>
      <span class="health-sep"></span>
      <span class="health-item" id="healthApi">📡 检查中…</span>
      <span class="last-fetch" id="lastFetch"></span>
    </div>

    <section class="status-strip" aria-label="当前默认模型">
      <div class="current-copy">
        <p class="eyebrow">Current Default</p>
        <div class="current-model">
          <code id="currentModel">加载中...</code>
          <span class="provider-pill" id="currentProvider">provider</span>
          <span class="current-pill">当前默认</span>
        </div>
      </div>
      <div class="meta-count" id="modelStats">正在读取配置</div>
    </section>

    <div class="layout">
      <aside class="selection-panel" aria-label="切换操作">
        <div class="panel-title">
          <h2>选中模型</h2>
          <span class="provider-pill" id="selectionState">未选择</span>
        </div>
        <div class="selected-card">
          <div class="selected-empty" id="selectedEmpty">点击任意模型后，可在这里执行切换。</div>
          <div class="selected-detail" id="selectedDetail" hidden>
            <div class="selected-provider" id="selectedProvider"></div>
            <div class="selected-model">
              <code id="selectedModel"></code>
              <p class="selection-note" id="selectionNote"></p>
            </div>
          </div>
        </div>
        <button class="switch-btn" id="switchBtn" type="button" hidden>切换到此模型</button>
      </aside>

      <section class="models-panel" aria-label="模型列表">
        <div class="models-heading">
          <h2>模型列表</h2>
          <span class="provider-pill" id="providerStats">加载中</span>
        </div>
        <div class="provider-list" id="providerList">
          <div class="loading"><span class="spinner"></span>加载中...</div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-root" id="toastRoot" aria-live="polite" aria-atomic="true"></div>

<script>
const state = {
  data: null,
  selected: null,
  switching: false,
  lastFetchAt: null,
  health: null,
  profiles: [],
  activeProfile: 'default',
};

const els = {
  refreshBtn: document.getElementById('refreshBtn'),
  switchBtn: document.getElementById('switchBtn'),
  providerList: document.getElementById('providerList'),
  currentModel: document.getElementById('currentModel'),
  currentProvider: document.getElementById('currentProvider'),
  modelStats: document.getElementById('modelStats'),
  providerStats: document.getElementById('providerStats'),
  selectionState: document.getElementById('selectionState'),
  selectedEmpty: document.getElementById('selectedEmpty'),
  selectedDetail: document.getElementById('selectedDetail'),
  selectedProvider: document.getElementById('selectedProvider'),
  selectedModel: document.getElementById('selectedModel'),
  selectionNote: document.getElementById('selectionNote'),
  toastRoot: document.getElementById('toastRoot'),
  // health
  healthDot: document.getElementById('healthDot'),
  healthLabel: document.getElementById('healthLabel'),
  healthConfig: document.getElementById('healthConfig'),
  healthHermes: document.getElementById('healthHermes'),
  healthApi: document.getElementById('healthApi'),
  lastFetch: document.getElementById('lastFetch'),
  // profile
  profileSelect: document.getElementById('profileSelect'),
  profileBadge: document.getElementById('profileBadge'),
};

els.refreshBtn.addEventListener('click', loadModelsWithRetry);
els.switchBtn.addEventListener('click', switchSelectedModel);
els.profileSelect.addEventListener('change', () => {
  state.activeProfile = els.profileSelect.value;
  state.selected = null;
  els.profileBadge.textContent = state.activeProfile === 'default' ? '' : '· ' + state.activeProfile;
  loadModelsWithRetry();
});
els.providerList.addEventListener('click', (event) => {
  const option = event.target.closest('.model-option');
  if (!option) return;

  state.selected = {
    provider: option.dataset.provider,
    model: option.dataset.model,
  };

  renderModels();
  renderSelection();
});

async function fetchProfiles() {
  try {
    const r = await fetch('/api/profiles', { cache: 'no-store' });
    const data = await r.json();
    state.profiles = Object.keys(data.profiles || {}).sort();
    populateProfileSelect();
  } catch (e) {
    console.warn('fetchProfiles failed:', e);
    state.profiles = ['default'];
  }
}

function populateProfileSelect() {
  const current = els.profileSelect.value || 'default';
  const icons = { default: '🟢', finance: '💰' };
  els.profileSelect.innerHTML = state.profiles.map(p =>
    `<option value="${p}">${icons[p] || '📋'} ${p}</option>`
  ).join('');
  els.profileSelect.value = state.profiles.includes(current) ? current : 'default';
  state.activeProfile = els.profileSelect.value;
  els.profileBadge.textContent = state.activeProfile === 'default' ? '' : '· ' + state.activeProfile;
}

async function loadModelsWithRetry() {
  let lastError = null;

  for (let attempt = 1; attempt <= 3; attempt += 1) {
    try {
      await loadModels();
      if (state.data) {
        if (attempt > 1) {
          showToast(`模型列表已恢复（第 ${attempt} 次尝试成功）`, 'success');
        }
        return;
      }
    } catch (error) {
      lastError = error;
    }

    if (attempt < 3) {
      await new Promise((resolve) => setTimeout(resolve, attempt * 600));
    }
  }

  if (lastError) {
    console.warn('loadModelsWithRetry failed:', lastError);
  }
}

async function loadModels() {
  renderLoading();

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 10000);

  try {
    const profile = state.activeProfile === 'default' ? '' : '?profile=' + encodeURIComponent(state.activeProfile);
    const response = await fetch('/api/models' + profile, { signal: controller.signal, cache: 'no-store' });
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || `HTTP ${response.status}`);
    }

    state.data = normalizeData(data);
    state.lastFetchAt = Date.now();
    keepValidSelection();
    render();
    fetchHealth();
  } catch (error) {
    state.data = null;
    const message = error.name === 'AbortError' ? '请求超时，请检查服务是否可达' : error.message;
    renderError(message);
  } finally {
    clearTimeout(timeoutId);
  }
}

function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

async function fetchHealth() {
  try {
    const profile = state.activeProfile === 'default' ? '' : '?profile=' + encodeURIComponent(state.activeProfile);
    const r = await fetch('/api/health' + profile, { cache: 'no-store' });
    state.health = await r.json();
  } catch {
    state.health = null;
  }
  renderHealth();
}

function renderHealth() {
  const h = state.health;
  els.lastFetch.textContent = state.lastFetchAt ? '最后更新 ' + formatTime(state.lastFetchAt) : '';

  if (!h) {
    els.healthDot.className = 'health-dot warn';
    els.healthLabel.textContent = '服务状态未知';
    els.healthConfig.innerHTML = '⚙️ 配置 —';
    els.healthHermes.innerHTML = '🧠 CLI —';
    els.healthApi.innerHTML = '📡 API —';
    return;
  }

  const ok = h.ok && h.config_exists;
  els.healthDot.className = ok ? 'health-dot ok' : 'health-dot warn';
  els.healthLabel.textContent = ok ? '服务正常' : '服务异常';
  els.healthLabel.textContent += state.activeProfile === 'default' ? '' : ' [' + state.activeProfile + ']';

  if (h.config_exists) {
    els.healthConfig.innerHTML = '<span class="health-dot ok" style="display:inline-block;width:6px;height:6px;margin-right:3px;vertical-align:-1px"></span>⚙️ 配置正常';
  } else {
    els.healthConfig.innerHTML = '<span class="health-dot err" style="display:inline-block;width:6px;height:6px;margin-right:3px;vertical-align:-1px"></span>⚙️ 配置缺失';
  }

  if (h.hermes_found && h.hermes_bin) {
    els.healthHermes.innerHTML = '<span class="health-dot ok" style="display:inline-block;width:6px;height:6px;margin-right:3px;vertical-align:-1px"></span>🧠 CLI ' + escapeHTML(h.hermes_bin.split('/').pop());
  } else {
    els.healthHermes.innerHTML = '<span class="health-dot err" style="display:inline-block;width:6px;height:6px;margin-right:3px;vertical-align:-1px"></span>🧠 CLI 不可用';
  }

  els.healthApi.innerHTML = '<span class="health-dot ok" style="display:inline-block;width:6px;height:6px;margin-right:3px;vertical-align:-1px"></span>📡 API 正常';
}

async function switchSelectedModel() {
  if (!state.selected || state.switching || isSelectedCurrent()) return;

  state.switching = true;
  renderSelection();

  try {
    const response = await fetch('/api/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...state.selected, profile: state.activeProfile }),
    });
    const result = await response.json();

    if (!response.ok || !result.ok) {
      throw new Error(result.error || `HTTP ${response.status}`);
    }

    showToast(`已切换到 ${state.selected.model} @ ${state.selected.provider}` + (state.activeProfile !== 'default' ? ` [${state.activeProfile}]` : ''), 'success');
    await loadModels();
    state.switching = false;
    renderSelection();
  } catch (error) {
    showToast(`切换失败：${error.message}`, 'error');
    state.switching = false;
    renderSelection();
  }
}

function normalizeData(data) {
  return {
    default_model: data.default_model || '',
    default_provider: data.default_provider || '',
    providers: data.providers || {},
  };
}

function keepValidSelection() {
  if (!state.selected || !state.data) return;
  const provider = state.data.providers[state.selected.provider];
  if (!provider || !provider.models.includes(state.selected.model)) {
    state.selected = null;
  }
}

function render() {
  renderCurrent();
  renderModels();
  renderSelection();
}

function renderLoading() {
  els.refreshBtn.disabled = true;
  els.providerList.innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';
  els.currentModel.textContent = '加载中...';
  els.currentProvider.textContent = 'provider';
  els.modelStats.textContent = '正在读取配置';
  els.providerStats.textContent = '加载中';
}

function renderError(message) {
  els.refreshBtn.disabled = false;
  const safeMessage = escapeHTML(message);
  els.providerList.innerHTML = `
    <div class="error-state">
      <div>
        <div>加载失败：${safeMessage}</div>
        <div style="margin-top:10px;color:var(--muted);font-size:13px;line-height:1.6;">
          可能是网络抖动、页面缓存或服务短暂不可达。请点击右上角“刷新列表”重试。
        </div>
      </div>
    </div>`;
  els.currentModel.textContent = '读取失败';
  els.currentProvider.textContent = 'error';
  els.modelStats.textContent = '请检查服务或配置文件';
  els.providerStats.textContent = '失败';
  renderSelection();
}

function renderCurrent() {
  const { default_model, default_provider, providers } = state.data;
  const providerCount = Object.keys(providers).length;
  const modelCount = countModels(providers);

  els.refreshBtn.disabled = false;
  els.currentModel.textContent = default_model || '未设置';
  els.currentProvider.textContent = default_provider || '未设置 provider';
  els.modelStats.textContent = `${providerCount} providers / ${modelCount} models`;
  els.providerStats.textContent = `${providerCount} providers`;
}

function renderModels() {
  if (!state.data) return;

  const { providers, default_model, default_provider } = state.data;
  const entries = Object.entries(providers);

  if (entries.length === 0) {
    els.providerList.innerHTML = '<div class="empty-state">没有在配置中找到 provider。</div>';
    return;
  }

  els.providerList.innerHTML = entries.map(([providerKey, providerInfo]) => {
    const models = Array.isArray(providerInfo.models) ? providerInfo.models : [];
    const providerLabel = providerInfo.name && providerInfo.name !== providerKey
      ? `<p class="provider-label">${escapeHTML(providerInfo.name)}</p>`
      : '';

    return `
      <article class="provider-group">
        <header class="provider-head">
          <div>
            <h3 class="provider-name">${escapeHTML(providerKey)}</h3>
            ${providerLabel}
          </div>
          <span class="model-count">${models.length} models</span>
        </header>
        <div class="models-grid">
          ${models.map((model) => renderModelOption(providerKey, model, default_provider, default_model)).join('')}
        </div>
      </article>
    `;
  }).join('');
}

function renderModelOption(provider, model, defaultProvider, defaultModel) {
  const isCurrent = provider === defaultProvider && model === defaultModel;
  const isSelected = state.selected && state.selected.provider === provider && state.selected.model === model;
  const classes = [
    'model-option',
    isCurrent ? 'is-current' : '',
    isSelected ? 'is-selected' : '',
  ].filter(Boolean).join(' ');

  return `
    <button
      class="${classes}"
      type="button"
      data-provider="${escapeAttr(provider)}"
      data-model="${escapeAttr(model)}"
      aria-pressed="${isSelected ? 'true' : 'false'}"
    >
      <span class="model-name">${escapeHTML(model)}</span>
      ${isCurrent ? '<span class="model-current-badge">当前默认</span>' : ''}
    </button>
  `;
}

function renderSelection() {
  const hasSelection = Boolean(state.selected);
  const current = hasSelection && isSelectedCurrent();

  els.selectedEmpty.hidden = hasSelection;
  els.selectedDetail.hidden = !hasSelection;
  els.switchBtn.hidden = !hasSelection;
  els.selectionState.textContent = hasSelection ? '已选择' : '未选择';

  if (!hasSelection) {
    els.switchBtn.disabled = true;
    els.switchBtn.textContent = '切换到此模型';
    return;
  }

  els.selectedProvider.textContent = state.selected.provider;
  els.selectedModel.textContent = state.selected.model;
  els.selectionNote.textContent = current
    ? '这是当前默认模型，无需重复切换。'
    : '将同时更新 model.default 和 model.provider。';
  els.switchBtn.disabled = state.switching || current;
  els.switchBtn.textContent = state.switching ? '切换中...' : '切换到此模型';
}

function isSelectedCurrent() {
  if (!state.data || !state.selected) return false;
  return state.selected.provider === state.data.default_provider
    && state.selected.model === state.data.default_model;
}

function countModels(providers) {
  return Object.values(providers).reduce((total, providerInfo) => {
    return total + (Array.isArray(providerInfo.models) ? providerInfo.models.length : 0);
  }, 0);
}

function showToast(message, type) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  els.toastRoot.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3600);
}

function escapeAttr(value) {
  return escapeHTML(value).replace(/`/g, '&#96;');
}

function escapeHTML(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

fetchProfiles().then(() => loadModelsWithRetry());
</script>
</body>
</html>
